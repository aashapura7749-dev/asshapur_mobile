<section id="second-hand-stock">
    <h2>📱 Available Second-Hand Phones (Best Deals)</h2>
    <div class="product-grid">
        <div class="phone-card">
            <h3>iPhone 13 (128GB)</h3>
            <p>Condition: Like New (95% Battery Health)</p>
            <p class="price">Price: ₹38,000</p>
            <p class="verified">✅ Bill & Box Available</p>
            <button onclick="buy('iPhone 13 Second Hand')">Buy Now</button>
        </div>
        
        <div class="phone-card">
            <h3>OnePlus 11R (8GB/128GB)</h3>
            <p>Condition: Minor Scratches</p>
            <p class="price">Price: ₹26,500</p>
            <p class="verified">✅ Original Box & Charger</p>
            <button onclick="buy('OnePlus 11R Second Hand')">Buy Now</button>
        </div>
    </div>
</section>
<section id="sell-form-section">
    <h2>💰 Sell Your Old Phone to Us</h2>
    <form id="sellPhoneForm" onsubmit="submitSellForm(event)">
        <label>Phone Model Name:</label>
        <input type="text" id="phoneModel" placeholder="e.g., iPhone 12 Pro" required>

        <label>Phone Condition:</label>
        <select id="phoneCondition">
            <option value="Excellent">Like New / No Scratches</option>
            <option value="Good">Good / Minor Scratches</option>
            <option value="Fair">Fair / Screen Changed</option>
        </select>

        <label>Do you have the Original Bill?</label>
        <select id="hasBill" required>
            <option value="Yes">Yes, I have the Bill</option>
            <option value="No">No Bill</option>
        </select>

        <label>Do you have the Original Box?</label>
        <select id="hasBox" required>
            <option value="Yes">Yes, I have the Box</option>
            <option value="No">No Box</option>
        </select>

        <label>Your Expected Price (₹):</label>
        <input type="number" id="expectedPrice" placeholder="e.g., 20000" required>

        <button type="submit">Submit Details to Shop</button>
    </form>
</section>
